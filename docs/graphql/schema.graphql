# Raworc GraphQL Schema Definition

# Root Types
type Query {
  # Public queries - no authentication required
  version: String!
  status: String!
  
  # Authentication query
  whoami: String!
  
  # Service Account queries
  serviceAccounts: [ServiceAccount!]!
  serviceAccount(name: String!, namespace: String): ServiceAccount
  
  # Role queries  
  roles: [Role!]!
  role(name: String!, namespace: String): Role
  
  # Role Binding queries
  roleBindings: [RoleBinding!]!
  roleBinding(name: String!, namespace: String): RoleBinding
}

type Mutation {
  # Authentication mutations
  generateServiceToken(input: ServiceAccountLoginInput!): TokenResponse!
  generateExternalToken(input: SubjectLoginInput!): TokenResponse!
  
  # Service Account management
  createServiceAccount(input: CreateServiceAccountInput!): ServiceAccount!
  deleteServiceAccount(name: String!, namespace: String): Boolean!
  
  # Role management
  createRole(input: CreateRoleInput!): Role!
  deleteRole(name: String!, namespace: String): Boolean!
  setupAdminRole: Role!
  setupViewerRole: Role!
  
  # Role Binding management
  createRoleBinding(input: CreateRoleBindingInput!): RoleBinding!
  deleteRoleBinding(name: String!, namespace: String): Boolean!
}

type Subscription {
  # Placeholder for future real-time features
  _placeholder: String!
}

# Core Types

type ServiceAccount {
  id: String!
  name: String!
  namespace: String
  passwordHash: String!
  description: String
  createdAt: String!
  active: Boolean!
}

type Role {
  id: String!
  name: String!
  namespace: String
  rules: [Rule!]!
  description: String
  createdAt: String!
}

type Rule {
  apiGroups: [String!]!
  resources: [String!]!
  verbs: [String!]!
  resourceNames: [String!]
}

type RoleBinding {
  id: String!
  name: String!
  namespace: String
  roleRef: RoleRef!
  subjects: [RoleBindingSubject!]!
  createdAt: String!
}

type RoleRef {
  kind: String!
  name: String!
  apiGroup: String!
}

type RoleBindingSubject {
  kind: SubjectType!
  name: String!
  namespace: String
}

type TokenResponse {
  token: String!
  expiresAt: String!
}

# Input Types

input ServiceAccountLoginInput {
  name: String!
  namespace: String
  password: String!
}

input SubjectLoginInput {
  subject: String!
}

input CreateServiceAccountInput {
  name: String!
  namespace: String
  password: String!
  description: String
}

input CreateRoleInput {
  name: String!
  namespace: String
  rules: [RuleInput!]!
  description: String
}

input RuleInput {
  apiGroups: [String!]!
  resources: [String!]!
  verbs: [String!]!
  resourceNames: [String!]
}

input CreateRoleBindingInput {
  name: String!
  namespace: String
  roleRef: RoleRefInput!
  subjects: [RoleBindingSubjectInput!]!
}

input RoleRefInput {
  kind: String!
  name: String!
  apiGroup: String!
}

input RoleBindingSubjectInput {
  kind: SubjectType!
  name: String!
  namespace: String
}

# Enums

enum SubjectType {
  SUBJECT
  SERVICE_ACCOUNT
}